<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/ProjectNeura/ProjectNeura/5ea0c73a40ad560e179c152ff3660d03924ef6e1/img/logo.png" />
  <title>Erbium Atom Loop</title>
  <style>
    :root {
      --bg1: #050816;
      --bg2: #0b1330;
      --glow: #7ef9ff;
      --glow2: #9b7bff;
      --core: #f8f3ff;
      --warm: #ff8ac7;
      --gold: #ffd580;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(155,123,255,0.12), transparent 25%),
        radial-gradient(circle at 80% 30%, rgba(126,249,255,0.10), transparent 25%),
        radial-gradient(circle at 50% 80%, rgba(255,138,199,0.08), transparent 30%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: white;
    }

    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    .hud {
      position: fixed;
      left: 24px;
      top: 24px;
      padding: 14px 16px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 18px;
      background: rgba(8, 12, 28, 0.42);
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.28);
      pointer-events: none;
    }

    .symbol {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.04em;
      line-height: 1;
      text-shadow: 0 0 18px rgba(126,249,255,0.35);
    }

    .meta {
      margin-top: 6px;
      font-size: 12px;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .credit {
      position: fixed;
      right: 20px;
      bottom: 16px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="hud">
    <div class="symbol">Erbium</div>
    <div class="meta">Compute Platform</div>
  </div>
  <div class="credit">Project Neura</div>

  <script>
    const canvas = document.getElementById('scene');
    const ctx = canvas.getContext('2d');

    let w = canvas.width = innerWidth * devicePixelRatio;
    let h = canvas.height = innerHeight * devicePixelRatio;
    let cx = w / 2;
    let cy = h / 2;
    const DPR = devicePixelRatio || 1;

    function resize() {
      w = canvas.width = innerWidth * DPR;
      h = canvas.height = innerHeight * DPR;
      cx = w / 2;
      cy = h / 2;
    }
    addEventListener('resize', resize);

    function project(x, y, z, camZ = 900) {
      const scale = camZ / (camZ - z);
      return {
        x: cx + x * scale,
        y: cy + y * scale,
        scale,
        visible: camZ - z > 0
      };
    }

    function rotX(p, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return { x: p.x, y: p.y * c - p.z * s, z: p.y * s + p.z * c };
    }
    function rotY(p, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return { x: p.x * c + p.z * s, y: p.y, z: -p.x * s + p.z * c };
    }
    function rotZ(p, a) {
      const c = Math.cos(a), s = Math.sin(a);
      return { x: p.x * c - p.y * s, y: p.x * s + p.y * c, z: p.z };
    }

    const stars = Array.from({ length: 140 }, () => ({
      x: (Math.random() - 0.5) * 2200,
      y: (Math.random() - 0.5) * 1400,
      z: Math.random() * 1200 - 300,
      r: Math.random() * 2 + 0.4,
      a: Math.random() * Math.PI * 2
    }));

    const rings = [
      { r: 90, tiltX: 0.95, tiltY: 0.25, speed: 0.55, color: '126,249,255' },
      { r: 145, tiltX: -0.45, tiltY: 0.95, speed: -0.36, color: '155,123,255' },
      { r: 210, tiltX: 0.35, tiltY: -0.85, speed: 0.24, color: '255,138,199' },
      { r: 280, tiltX: -1.0, tiltY: -0.2, speed: -0.18, color: '255,213,128' }
    ];

    const electrons = [];
    const counts = [4, 8, 12, 16];
    rings.forEach((ring, i) => {
      for (let k = 0; k < counts[i]; k++) {
        electrons.push({
          ring,
          phase: (k / counts[i]) * Math.PI * 2,
          size: 3 + i * 0.45 + Math.random() * 1.8,
          trail: []
        });
      }
    });

    function orbitPoint(ring, theta) {
      let p = { x: Math.cos(theta) * ring.r, y: Math.sin(theta) * ring.r, z: 0 };
      p = rotX(p, ring.tiltX);
      p = rotY(p, ring.tiltY);
      return p;
    }

    function drawGlowCircle(x, y, r, rgba, blur = 18) {
      ctx.save();
      ctx.shadowBlur = blur;
      ctx.shadowColor = rgba;
      ctx.fillStyle = rgba;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawRing(ring, t, globalRotY, globalRotX) {
      ctx.beginPath();
      let started = false;
      for (let i = 0; i <= 220; i++) {
        const a = (i / 220) * Math.PI * 2;
        let p = orbitPoint(ring, a + t * ring.speed * 0.15);
        p = rotY(p, globalRotY);
        p = rotX(p, globalRotX);
        const pp = project(p.x, p.y, p.z);
        if (!pp.visible) continue;
        if (!started) {
          ctx.moveTo(pp.x, pp.y);
          started = true;
        } else {
          ctx.lineTo(pp.x, pp.y);
        }
      }
      ctx.strokeStyle = `rgba(${ring.color}, 0.22)`;
      ctx.lineWidth = 1.2 * DPR;
      ctx.shadowBlur = 16;
      ctx.shadowColor = `rgba(${ring.color}, 0.22)`;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function drawStars(t) {
      for (const s of stars) {
        const tw = 0.55 + 0.45 * Math.sin(t * 0.001 + s.a);
        const pp = project(s.x, s.y, s.z - 300);
        const rr = s.r * pp.scale;
        ctx.fillStyle = `rgba(255,255,255,${0.18 + tw * 0.5})`;
        ctx.beginPath();
        ctx.arc(pp.x, pp.y, rr, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function frame(ms) {
      const t = ms * 0.001;
      ctx.clearRect(0, 0, w, h);

      drawStars(ms);

      const globalRotY = t * 0.22;
      const globalRotX = Math.sin(t * 0.7) * 0.12 + 0.35;
      const pulse = 1 + 0.06 * Math.sin(t * 2.2);

      const depthItems = [];

      for (const ring of rings) {
        drawRing(ring, t, globalRotY, globalRotX);
      }

      for (const e of electrons) {
        const theta = e.phase + t * e.ring.speed;
        let p = orbitPoint(e.ring, theta);
        p = rotY(p, globalRotY);
        p = rotX(p, globalRotX);

        e.trail.push({ x: p.x, y: p.y, z: p.z });
        if (e.trail.length > 20) e.trail.shift();

        depthItems.push({ type: 'trail', obj: e, z: p.z - 0.001 });
        depthItems.push({ type: 'electron', obj: e, p, z: p.z });
      }

      for (let i = 0; i < 36; i++) {
        const a = (i / 36) * Math.PI * 2 + t * 0.7;
        const rr = 22 + 10 * Math.sin(t * 1.4 + i);
        let p = { x: Math.cos(a) * rr, y: Math.sin(a) * rr, z: Math.sin(a * 3 + t) * 18 };
        p = rotY(p, globalRotY * 1.4);
        p = rotX(p, globalRotX * 1.3);
        depthItems.push({ type: 'nucleusSpark', p, z: p.z, i });
      }

      depthItems.push({ type: 'core', z: 0 });
      depthItems.sort((a, b) => a.z - b.z);

      for (const item of depthItems) {
        if (item.type === 'trail') {
          const tr = item.obj.trail;
          for (let i = 1; i < tr.length; i++) {
            const a = tr[i - 1], b = tr[i];
            const pa = project(a.x, a.y, a.z);
            const pb = project(b.x, b.y, b.z);
            const alpha = (i / tr.length) * 0.18;
            ctx.strokeStyle = `rgba(${item.obj.ring.color}, ${alpha})`;
            ctx.lineWidth = (i / tr.length) * 2.2 * DPR;
            ctx.beginPath();
            ctx.moveTo(pa.x, pa.y);
            ctx.lineTo(pb.x, pb.y);
            ctx.stroke();
          }
        } else if (item.type === 'core') {
          drawGlowCircle(cx, cy, 38 * pulse * DPR, 'rgba(248,243,255,0.95)', 34 * DPR);
          drawGlowCircle(cx, cy, 68 * pulse * DPR, 'rgba(126,249,255,0.10)', 70 * DPR);
          drawGlowCircle(cx, cy, 95 * pulse * DPR, 'rgba(155,123,255,0.05)', 110 * DPR);
        } else if (item.type === 'nucleusSpark') {
          const pp = project(item.p.x, item.p.y, item.p.z);
          const r = (2.6 + 1.2 * Math.sin(t * 3 + item.i)) * pp.scale * DPR;
          const c = item.i % 3 === 0 ? 'rgba(126,249,255,0.9)' : item.i % 3 === 1 ? 'rgba(255,138,199,0.9)' : 'rgba(255,213,128,0.95)';
          drawGlowCircle(pp.x, pp.y, r, c, 16 * DPR);
        } else if (item.type === 'electron') {
          const pp = project(item.p.x, item.p.y, item.p.z);
          const r = item.obj.size * pp.scale * DPR;
          const rgba = `rgba(${item.obj.ring.color},0.96)`;
          drawGlowCircle(pp.x, pp.y, r, rgba, 18 * DPR);
          drawGlowCircle(pp.x, pp.y, r * 0.42, 'rgba(255,255,255,0.9)', 8 * DPR);
        }
      }

      const ringSweep = 340 + 25 * Math.sin(t * 0.8);
      const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, ringSweep * DPR);
      halo.addColorStop(0, 'rgba(126,249,255,0.00)');
      halo.addColorStop(0.55, 'rgba(126,249,255,0.02)');
      halo.addColorStop(0.8, 'rgba(155,123,255,0.03)');
      halo.addColorStop(1, 'rgba(0,0,0,0.00)');
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(cx, cy, ringSweep * DPR, 0, Math.PI * 2);
      ctx.fill();

      requestAnimationFrame(frame);
    }

    requestAnimationFrame(frame);
  </script>
</body>
</html>
