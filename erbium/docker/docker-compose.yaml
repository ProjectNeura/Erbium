services:
  SERVICE_NAME:
    image: nvidia/cuda:13.0.0-devel-ubuntu24.04
    hostname: erbium
    container_name: erbium
    secrets:
      - tailscale_authkey
    environment:
      - TS_AUTHKEY_FILE=/run/secrets/tailscale_authkey
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./motd:/etc/motd:ro
      - ./venv.sh:/etc/profile.d/venv.sh:ro
      - ./monitor.cpp:/workspace/monitor.cpp:ro
      - S:/erbium_input:/workspace/input:ro
      - S:/erbium_output:/workspace/output
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    command: >
      sh -lc '
              apt-get update
              apt-get install -y curl git python3.12 python3.12-venv
              python3.12 -m venv /workspace/venv
              g++ -std=c++17 -O2 /workspace/monitor.cpp -lnvidia-ml -o /workspace/monitor
              chmod +x /workspace/monitor
              nohup /workspace/monitor > /workspace/monitor.log 2>&1 &
              curl -fsSL https://tailscale.com/install.sh | sh
              tailscaled --statedir=${TS_STATE_DIR} --socket=/var/run/tailscale/tailscaled.sock &
              for i in $(seq 1 100); do
                tailscale status >/dev/null 2>&1 && break
                sleep 0.2
              done
              tailscale up --reset --authkey="$(cat /run/secrets/tailscale_authkey)" --hostname="${HOSTNAME}" --ssh
              wait
             '
    restart: unless-stopped
volumes:
  ts-state:
secrets:
  tailscale_authkey:
    file: ./tailscale_authkey.txt