services:
  SERVICE_NAME:
    image: nvidia/cuda:13.0.0-devel-ubuntu24.04
    hostname: erbium
    container_name: erbium
    networks: [labnet]
    volumes:
      - erbium_app:/workspace/app
      - erbium_venv:/workspace/venv
      - erbium_pvenvs:/workspace/pvenvs
      - ./motd:/etc/motd:ro
      - ./venv.sh:/etc/profile.d/venv.sh:ro
      - ./backup-output.sh:/usr/local/bin/backup-output.sh:ro
      - ./skills:/opt/erbium-skills:ro
      - S:/erbium_input:/workspace/input:ro
      - S:/erbium_output:/workspace/output
      - S:/erbium_backup:/workspace/backup
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      BORG_REPO: /workspace/backup
    command: >
      bash -lc '
              set -e
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y ca-certificates curl unzip zip wget git gnupg openssh-server python3.11 python3.11-venv python3.12 python3.12-venv python3.13 python3.13-venv tmux vim borgbackup nodejs npm
              npm i -g @openai/codex @anthropic-ai/claude-code
              mkdir -p /var/run/sshd
              id -u access >/dev/null 2>&1 || useradd -m -s /bin/bash access
              echo "access:sshpassword" | chpasswd
              groupadd -f video
              groupadd -f render
              usermod -aG video,render access || true
              chown -R access:access /workspace/app /workspace/output /workspace/venv /workspace/pvenvs /usr/local/lib/node_modules
              su - access -c "mkdir -p ~/.claude/skills/use-erbium ~/.codex/skills/use-erbium"
              su - access -c "ln -sfn /opt/erbium-skills/use-erbium/SKILL.md ~/.claude/skills/use-erbium/SKILL.md"
              su - access -c "ln -sfn /opt/erbium-skills/use-erbium/SKILL.md ~/.codex/skills/use-erbium/SKILL.md"
              if [ ! -x /workspace/venv/bin/python ]; then
                su - access -c "python3.12 -m venv /workspace/venv"
                su - access -c "/workspace/venv/bin/pip install --upgrade pip"
                su - access -c "/workspace/venv/bin/pip install torch torchvision jupyterlab git+https://github.com/ProjectNeura/Erbium"
              fi
              chown root:root /workspace/backup
              chmod 700 /workspace/backup
              if [ ! -f /workspace/backup/config ]; then
                borg init --encryption=none /workspace/backup
              fi
              (
                while true; do
                /usr/local/bin/backup-output.sh || true
                sleep 43200
                done
              ) &
              echo "PermitRootLogin no" >> /etc/ssh/sshd_config
              echo "PubkeyAuthentication no" >> /etc/ssh/sshd_config
              echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config
              echo "AllowUsers access" >> /etc/ssh/sshd_config
              /usr/sbin/sshd
              su - access -c "/workspace/venv/bin/jupyter lab --no-browser --port=8080 --ip=0.0.0.0 --ServerApp.root_dir=/workspace --ServerApp.trust_xheaders=True --ServerApp.allow_remote_access=True" &
              /workspace/venv/bin/python -m erbium server run -p 8000
            '
    restart: unless-stopped
networks:
  labnet:
    external: true
volumes:
  erbium_app:
  erbium_venv:
  erbium_pvenvs: