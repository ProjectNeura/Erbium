services:
  SERVICE_NAME:
    image: nvidia/cuda:13.0.0-devel-ubuntu24.04
    hostname: erbium
    container_name: erbium
    secrets:
      - tailscale_authkey
    environment:
      - TUNNEL_CRED=/run/secrets/tailscale_authkey
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./motd:/etc/motd:ro
      - ./venv.sh:/etc/profile.d/venv.sh:ro
      - ./tunnel.json:/etc/cloudflared/tunnel.json:ro
      - ./monitor.cpp:/workspace/monitor.cpp:ro
      - S:/erbium_input:/workspace/input:ro
      - S:/erbium_output:/workspace/output
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    command: >
      sh -lc '
              apt-get update
              apt-get install -y ca-certificates curl gnupg git python3.12 python3.12-venv
              python3.12 -m venv /workspace/venv
              apt-get install -y libnvidia-ml-dev
              g++ -std=c++17 -O2 /workspace/monitor.cpp -lnvidia-ml -o /workspace/monitor
              chmod +x /workspace/monitor
              nohup /workspace/monitor > /workspace/monitor.log 2>&1 &
              mkdir -p --mode=0755 /usr/share/keyrings
              curl -fsSL https://pkg.cloudflare.com/cloudflare-public-v2.gpg | tee /usr/share/keyrings/cloudflare-public-v2.gpg >/dev/null
              echo "deb [signed-by=/usr/share/keyrings/cloudflare-public-v2.gpg] https://pkg.cloudflare.com/cloudflared any main" > /etc/apt/sources.list.d/cloudflared.list
              apt-get update
              apt-get install -y cloudflared
              rm -rf /var/lib/apt/lists/*
              chmod 600 /etc/cloudflared/tunnel.json
              chown root:root /etc/cloudflared/tunnel.json
              cloudflared tunnel run ssh-tunnel
              wait
             '
    restart: unless-stopped
volumes:
  ts-state:
secrets:
  tailscale_authkey:
    file: ./tailscale_authkey.txt