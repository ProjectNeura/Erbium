services:
  ts:
    image: tailscale/tailscale:stable
    container_name: ts
    hostname: erbium-self-service
    secrets:
      - tailscale_authkey
    environment:
      - TS_AUTHKEY_FILE=/run/secrets/tailscale_authkey
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
    volumes:
      - ts-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./motd:/etc/motd:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
    command: >
      sh -lc '
              tailscaled --statedir=${TS_STATE_DIR} --socket=/var/run/tailscale/tailscaled.sock &
              for i in $(seq 1 100); do
                tailscale status >/dev/null 2>&1 && break
                sleep 0.2
              done
              tailscale up --reset \
                --authkey="$(cat /run/secrets/tailscale_authkey)" \
                --hostname="${HOSTNAME}" \
                --ssh
              echo 'alias app="docker exec -it node bash"' >> ~/.bashrc
              source ~/.bashrc
              wait
            '
  app:
    image: nvcr.io/nvidia/pytorch:25.10-py3
    container_name: node
    network_mode: "service:ts"
    volumes:
      - S:/erbium_input:/workspace/input:ro
      - S:/erbium_output:/workspace/output
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]
    depends_on:
      - ts
    restart: unless-stopped
volumes:
  ts-state:
secrets:
  tailscale_authkey:
    file: tailscale_authkey.txt